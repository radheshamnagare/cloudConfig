eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

microservice:
  payment-service:
    endpoint:
      uri: lb://PAYMENT-SERVICE
  order-service:
    endpoint:
      uri: lb://ORDER-SERVICE
